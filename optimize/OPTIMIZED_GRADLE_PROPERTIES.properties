# ============================================================================
# OPTIMIZED gradle.properties FOR ANDROID BUILD PERFORMANCE
# ============================================================================
# File: android/gradle.properties
#
# These settings dramatically improve Gradle build performance
# ============================================================================

# ============================================================================
# GRADLE OPTIMIZATION (Most Important!)
# ============================================================================

# ✅ CRITICAL: Enable parallel task execution (huge speed improvement)
org.gradle.parallel=true

# ✅ CRITICAL: Set max worker threads (usually = CPU count)
# For 8-core CPU:
org.gradle.workers.max=8

# ✅ RECOMMENDED: Increase Gradle heap size (prevent OutOfMemory)
org.gradle.jvmargs=-Xmx4096m -XX:MaxPermSize=1024m

# ✅ RECOMMENDED: Use Gradle configuration cache (6.5+)
# Skips task configuration for unchanged projects
org.gradle.configuration-cache=true
org.gradle.configuration-cache.problems=warn

# ✅ RECOMMENDED: Enable build cache
# Reuses build outputs from previous builds
org.gradle.caching=true

# ✅ RECOMMENDED: Configure only needed tasks (faster startup)
org.gradle.configureondemand=true

# ============================================================================
# KOTLIN COMPILER OPTIMIZATION
# ============================================================================

# ✅ CRITICAL: Enable incremental Kotlin compilation
# Huge speed improvement, only recompiles changed code
kotlin.incremental=true
kotlin.incremental.js=true
kotlin.incremental.usePreciseJavaTracking=true

# ✅ RECOMMENDED: Disable unnecessary Kotlin multiplatform features
# If you're not using multiplatform
kotlin.mpp.enableCInteropCommonization=false

# ✅ OPTIONAL: Use K2 compiler (new Kotlin compiler, faster in future)
# kotlin.language.version=2.0
# (Wait for stable release, not ready for production yet)

# ============================================================================
# ANDROID GRADLE PLUGIN OPTIMIZATION
# ============================================================================

# ✅ CRITICAL: Use latest AGP version (includes optimizations)
# Update build.gradle.kts: id("com.android.application") version "8.4.0"

# ✅ RECOMMENDED: Enable per-module R8 invocation
# Each module processed separately (better parallelization)
android.useModuleMR8=true

# ✅ RECOMMENDED: Use incremental dexing
android.incrementalDexing=true
android.incrementalDexing.v2=true

# ✅ RECOMMENDED: Pre-dex libraries
android.preDexLibraries=true

# ============================================================================
# LINT OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Run lint in parallel
android.lint.useK8s=true

# ✅ OPTIONAL: Disable lint checks you don't care about
# (Configure in build.gradle.kts instead for per-module control)
android.lintSkip=true  # Only if you really don't want lint

# ============================================================================
# RESOURCE OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Only package enabled languages
# Reduces APK size by excluding ~200 languages Flutter doesn't use
android.includeDynamicLanguageResources=false

# ✅ RECOMMENDED: Use vector drawables (smaller than PNGs)
android.enableVectorDrawable=true

# ============================================================================
# BUILD VARIANT OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Only build active variant (speeds up development)
# Comment out for CI/CD where all variants needed
android.buildOnlyTargetAbi=true

# ✅ RECOMMENDED: Which ABI to build locally for testing
# Comment out to build all ABIs (slower but required for release)
android.preferredAbis=arm64-v8a

# ============================================================================
# DEXING OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Enable D8 dexer (modern, faster)
android.enableD8=true

# ✅ RECOMMENDED: Enable the new dex splitter
android.enableDexSplitter=true

# ============================================================================
# PLUGIN OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Use plugin DSL cache
android.pluginDslCache=true

# ============================================================================
# DEBUGGING & DEVELOPMENT
# ============================================================================

# ✅ DEVELOPMENT: Enable strict mode for catching issues early
android.strictMode=true

# ✅ OPTIONAL: Verbose logging (only when debugging build issues)
# org.gradle.logging.level=debug
# org.gradle.workers.debug=true

# ============================================================================
# NETWORK & DEPENDENCY OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Only download needed libraries
# Don't download all transitive dependencies
org.gradle.parallel.threads=8

# ✅ RECOMMENDED: Fail fast on dependency errors
org.gradle.warning.mode=fail

# ============================================================================
# FLUTTER SPECIFIC OPTIMIZATION
# ============================================================================

# ✅ RECOMMENDED: Disable Flutter's automatic plugin discovery if not using
# (Only applies if you have custom Flutter plugins)
# flutter.enabled=true (usually auto-detected)

# ============================================================================
# VERSION SETTINGS (Must Match App)
# ============================================================================

# Gradle Wrapper version (auto-updated by Flutter)
# Check gradle/wrapper/gradle-wrapper.properties

# AGP version (in app build.gradle.kts)
# Usually handled by Flutter plugin

# Kotlin version (in app build.gradle.kts)
# Check plugins { id("org.jetbrains.kotlin.android") version "..." }

# ============================================================================
# TROUBLESHOOTING SETTINGS
# ============================================================================

# 🔧 If build is slow, try:
# 1. Increase org.gradle.jvmargs to -Xmx8192m
# 2. Set org.gradle.workers.max=10 (more than CPU count)
# 3. Clear cache: ./gradlew clean build --no-build-cache
# 4. Check org.gradle.caching=true (might be slowing down)

# 🔧 If running out of memory:
# org.gradle.jvmargs=-Xmx8192m -XX:+UseG1GC

# 🔧 If parallel builds are causing issues:
# org.gradle.parallel=false (for debugging)

# 🔧 If incremental Kotlin not working:
# kotlin.incremental=false (fallback to full recompilation)

# 🔧 If strange caching issues:
# org.gradle.caching=false (disable build cache)

# ============================================================================
# ANDROID STUDIO PREFERENCES
# ============================================================================

# Android Studio will use these settings automatically
# But you can also set in Settings > Build, Execution, Deployment > Gradle

# ============================================================================
# CI/CD SPECIFIC SETTINGS
# ============================================================================

# 🚀 For CI/CD pipelines (GitHub Actions, GitLab, etc), add:
# 
# org.gradle.parallel=true
# org.gradle.workers.max=2  # Use fewer workers on CI (limited resources)
# org.gradle.caching=true   # Cache helps subsequent builds
# org.gradle.vfs.watch=false  # Disable file watching on CI
# org.gradle.warning.mode=all  # Capture all warnings
#
# Example for GitHub Actions:
#
# - name: Build Release APK
#   run: |
#     cd android && \
#     ./gradlew assembleRelease \
#       -Dorg.gradle.jvmargs=-Xmx2048m \
#       -Dorg.gradle.parallel=true \
#       --build-cache
#

# ============================================================================
# PERFORMANCE METRICS
# ============================================================================

# To measure build performance:
# 1. Build with profile: ./gradlew assembleDebug --profile
# 2. Open: build/reports/profile-TIMESTAMP/profile-TIMESTAMP.html
# 3. Analyze slowest tasks
#
# Expected build times (with optimization):
# ├─ Clean build (debug):    30-60 seconds
# ├─ Incremental (debug):    5-15 seconds
# ├─ Clean build (release):  90-120 seconds
# ├─ Incremental (release):  30-45 seconds
#
# If slower than above, check:
# - CPU utilization (should be high)
# - Memory pressure (should be <50% of allocated)
# - Disk I/O (SSD vs HDD makes huge difference)
# - Network (downloading dependencies?)

