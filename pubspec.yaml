name: bdnewsreader
description: A new Flutter project.
publish_to: "none"
version: 1.0.2+84

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^7.0.0

  # UI & State Management
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1

  # Networking
  http: ^1.3.0
  url_launcher: ^6.3.1
  connectivity_plus: ^7.0.0
  workmanager: ^0.9.0

  # Storage, Utils & Parsing
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  flutter_dotenv: ^6.0.0
  xml: ^6.6.1
  webfeed_revised: ^0.9.0
  logger: ^2.5.0

  # WebView — android platform impl is auto-resolved as endorsed plugin
  webview_flutter: ^4.10.0
  flutter_inappwebview: ^6.1.5

  # Media, Animations & UI Enhancements
  shimmer: ^3.0.0
  lottie: ^3.3.2
  cached_network_image: ^3.4.1
  html: ^0.15.5+1
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.5
  audio_session: ^0.2.2 # Proper audio session management for TTS
  just_audio: ^0.10.5 # Background audio playback
  audio_service: ^0.18.15 # Lockscreen controls
  sqflite: ^2.3.3 # Offline chunk caching
  path: ^1.9.1 # File path utilities

  # Firebase & Auth
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  firebase_crashlytics: ^5.0.6
  cloud_functions: ^6.0.7
  firebase_analytics: ^12.1.0
  firebase_messaging: ^16.1.0
  firebase_remote_config: ^6.1.3
  google_sign_in: ^6.2.1

  # Navigation & Theming
  go_router: ^17.1.0
  dynamic_color: ^1.7.0
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  path_provider: ^2.1.5

  # Internationalization
  flutter_localizations:
    sdk: flutter

  # HTTP client (ssl pinning / interceptor)
  dio: ^5.8.0+1

  # Hive Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0 # JSON serialization annotations for API models
  flutter_local_notifications: ^20.1.0
  confetti: ^0.8.0
  flutter_cache_manager: any

  # Security
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.5
  rxdart: ^0.28.0
  tflite_flutter: ^0.12.1
  reorderables: ^0.6.0
  drift: ^2.20.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.41
  firebase_performance: ^0.11.1+4
  socket_io_client: ^3.1.4
  flutter_widget_from_html: ^0.17.1
  uuid: any
  equatable: any
  synchronized: any
  firebase_app_check: ^0.4.1+5
  google_fonts: ^8.0.2

dependency_overrides:
  intl: ^0.20.2
  path_provider_foundation: 2.3.0 # Force older version to avoid objective_c native assets hook failure

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  analyzer: ^6.4.1
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.4.0
  firebase_auth_mocks: ^0.15.1
  # codegen
  build_runner: ^2.4.8
  drift_dev: ^2.20.0
  hive_generator: ^2.0.1
  args: ^2.7.0

  # testing utilities
  mockito: ^5.4.4
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  network_image_mock: ^2.1.1

  image: any
  firebase_remote_config_platform_interface: any

  cloud_firestore_platform_interface: any
  in_app_purchase_platform_interface: any
  workmanager_platform_interface: any
  plugin_platform_interface: any
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/play_store_512-app.png"
  adaptive_icon_background: "#F8F9FF"
  adaptive_icon_foreground: "assets/play_store_512-app.png"

flutter_native_splash:
  color: "#0B0B14"
  image: "assets/play_store_512-app.png"
  android_12:
    image: "assets/play_store_512-app.png"
    icon_background_color: "#0B0B14"
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/images/
    - assets/icons_new/android/
    - assets/data.json
    - assets/logos/
    - assets/google_pay_config.json
    - assets/lottie/
    - assets/quizzes/bn_daily_expanded.json
    - assets/quizzes/en_daily_expanded.json
    - assets/certs/newsapi.pem
    - assets/certs/openweathermap.pem
    - assets/js/
