name: bdnewsreader
description: A new Flutter project.
publish_to: "none"
version: 1.0.1+24

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^7.0.0
  pay: ^3.3.0

  # UI & State Management
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1

  # Networking & Location
  http: ^1.3.0
  url_launcher: ^6.3.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  connectivity_plus: ^7.0.0
  speed_test_dart: ^1.0.0
  workmanager: ^0.9.0

  # Storage, Utils & Parsing
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  fluttertoast: ^9.0.0
  flutter_dotenv: ^6.0.0
  xml: ^6.6.1
  webfeed_revised: ^0.9.0
  logger: ^2.5.0

  # WebView & Media
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.10.0
  webview_flutter_wkwebview: ^3.16.2
  flutter_inappwebview: ^6.1.5

  # Media, Animations & UI Enhancements
  shimmer: ^3.0.0
  lottie: ^3.3.2
  cached_network_image: ^3.4.1
  animations: ^2.1.1
  vector_math: ^2.1.4
  html: ^0.15.5+1
  flutter_svg: ^2.2.3
  audioplayers: ^6.1.0
  smooth_page_indicator: ^2.0.1
  flutter_tts: ^4.2.5
  audio_session: ^0.2.2 # Proper audio session management for TTS
  just_audio: ^0.10.5 # Background audio playback
  audio_service: ^0.18.15 # Lockscreen controls
  sqflite: ^2.3.3 # Offline chunk caching
  path: ^1.9.1 # File path utilities

  # Firebase & Auth (Phase 3A: Updated)
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  firebase_crashlytics: ^5.0.6
  cloud_functions: ^6.0.7
  firebase_analytics: ^12.1.0
  firebase_messaging: ^16.1.0
  firebase_remote_config: ^6.1.3
  google_sign_in: ^6.2.1

  # Navigation & Theming
  go_router: ^17.1.0
  dynamic_color: ^1.7.0
  nested: any
  pull_to_refresh: ^2.0.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^8.0.1
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  package_info_plus: ^9.0.0
  device_info_plus: ^12.3.0
  path_provider: ^2.1.5

  # Internationalization
  flutter_localizations:
    sdk: flutter

  # Codegen & Utilities
  flutter_gen: ^5.9.0 # Kept at 5.9.0 due to hive_generator conflict
  flutter_rating_bar: ^4.0.1
  dio: ^5.8.0+1

  # Hive Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0 # JSON serialization annotations for API models
  flutter_local_notifications: ^20.1.0
  string_similarity: ^2.0.0
  confetti: ^0.8.0
  change_case: ^2.2.0
  flutter_cache_manager: any

  # 🔐 SECURITY
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.5
  encrypt: ^5.0.1 # Compatible with firebase_auth_mocks via pointycastle ^3.6.2
  rxdart: ^0.28.0
  tflite_flutter: ^0.12.1
  reorderables: ^0.6.0
  drift: ^2.20.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.5.41
  firebase_performance: ^0.11.1+4
  socket_io_client: ^3.1.4
  flutter_widget_from_html: ^0.17.1
  uuid: any
  equatable: any
  synchronized: any
  firebase_app_check: ^0.4.1+5

dependency_overrides:
  intl: ^0.20.2
  pointycastle: ^3.9.1 # Force compatible version for encrypt + firebase_auth_mocks
  path_provider_foundation: 2.3.0 # Force older version to avoid objective_c native assets hook failure

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  analyzer: ^6.4.1
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.4.0
  firebase_auth_mocks: ^0.15.1
  # codegen
  build_runner: ^2.4.8
  drift_dev: ^2.20.0
  hive_generator: ^2.0.1
  args: ^2.7.0

  # testing utilities
  mockito: ^5.4.4
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  network_image_mock: ^2.1.1

  image: any
  firebase_remote_config_platform_interface: any

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons_new/android/play_store_512.png"
  adaptive_icon_background: "#F8F9FF"
  adaptive_icon_foreground: "assets/icons_new/android/play_store_512.png"

flutter_native_splash:
  color: "#0B0B14"
  image: "assets/play_store_512-app.png"
  android_12:
    image: "assets/play_store_512-app.png"
    icon_background_color: "#0B0B14"
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/icons_new/
    - assets/icons_new/android/
    - assets/sounds/
    - assets/data.json
    - assets/widgets/
    - assets/logos/
    - assets/google_pay_config.json
    - assets/ml_data/
    - assets/models/
    - assets/models/
    - assets/lottie/
    - assets/quizzes/bn_daily_expanded.json
    - assets/quizzes/en_daily_expanded.json
    - assets/certs/newsapi.pem
    - assets/certs/openweathermap.pem
    - assets/js/
